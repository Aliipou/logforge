name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check . --select E,F,I --ignore E501,E402,F401,F811,F841,UP --exclude .git,__pycache__ || true

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install pytest pytest-cov pytest-asyncio
          pip install fastapi uvicorn pydantic pydantic-settings asyncpg redis
      - name: Run unit tests
        run: pytest tests/unit -v --cov --cov-report=xml || true
      - uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
        continue-on-error: true

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose build --no-cache
        continue-on-error: true
