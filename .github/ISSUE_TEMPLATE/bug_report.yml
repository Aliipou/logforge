name: Bug Report
description: Something is broken
labels: [bug]
body:
  - type: markdown
    attributes:
      value: "Thanks for taking the time to report a bug."

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `docker compose up`
        2. Send a request to POST /logs
        3. See error
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste `docker compose logs <service>` output
      render: shell

  - type: dropdown
    id: service
    attributes:
      label: Which service?
      options:
        - ingestion_service
        - processor_service
        - query_service
        - docker compose / infra
